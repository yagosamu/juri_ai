{% extends 'base.html' %}
{% block 'title' %}Editar {{ cliente.nome }} — JuriAI{% endblock %}

{% block 'content' %}
<div class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between sticky top-0 z-10">
  <div>
    <div class="flex items-center gap-1.5 text-xs text-slate-400 font-medium mb-1">
      <a href="{% url 'dashboard' %}" class="hover:text-slate-600 transition-colors">Início</a>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
      <a href="{% url 'clientes' %}" class="hover:text-slate-600 transition-colors">Clientes</a>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
      <a href="{% url 'cliente' cliente.id %}" class="hover:text-slate-600 transition-colors">{{ cliente.nome }}</a>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
      <span class="text-slate-600">Editar</span>
    </div>
    <h1 class="text-slate-900 text-xl font-semibold tracking-tight mt-1">Editar cliente</h1>
  </div>
</div>

<div class="px-8 py-8 max-w-2xl">
  <form method="post">
    {% csrf_token %}
    <div class="bg-white rounded-2xl border border-slate-200 divide-y divide-slate-100">

      <div class="px-6 py-4 flex items-center gap-4">
        <label class="w-32 text-sm font-medium text-slate-600 flex-shrink-0">Nome *</label>
        <input type="text" name="nome" value="{{ cliente.nome }}" required
               class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div class="px-6 py-4 flex items-center gap-4">
        <label class="w-32 text-sm font-medium text-slate-600 flex-shrink-0">E-mail *</label>
        <input type="email" name="email" value="{{ cliente.email }}" required
               class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div class="px-6 py-4 flex items-center gap-4">
        <label class="w-32 text-sm font-medium text-slate-600 flex-shrink-0">Tipo</label>
        <select name="tipo"
                class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="PF" {% if cliente.tipo == 'PF' %}selected{% endif %}>Pessoa Física</option>
          <option value="PJ" {% if cliente.tipo == 'PJ' %}selected{% endif %}>Pessoa Jurídica</option>
        </select>
      </div>

      <div class="px-6 py-4 flex items-center gap-4">
        <label class="w-32 text-sm font-medium text-slate-600 flex-shrink-0">Telefone</label>
        <input type="text" name="telefone" value="{{ cliente.telefone }}"
               class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500"
               placeholder="(11) 99999-9999">
      </div>

      <div class="px-6 py-4 flex items-center gap-4">
        <label class="w-32 text-sm font-medium text-slate-600 flex-shrink-0">Status</label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="status" {% if cliente.status %}checked{% endif %}
                 class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
          <span class="text-sm text-slate-700">Cliente ativo</span>
        </label>
      </div>

    </div>

    <div class="flex gap-3 mt-6">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl text-sm font-medium transition-colors">
        Salvar alterações
      </button>
      <a href="{% url 'cliente' cliente.id %}"
         class="border border-slate-200 hover:bg-slate-50 text-slate-600 px-6 py-2.5 rounded-xl text-sm font-medium transition-colors">
        Cancelar
      </a>
    </div>
  </form>
</div>
{% endblock %}
