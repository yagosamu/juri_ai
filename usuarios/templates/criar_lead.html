{% extends 'base.html' %}
{% block 'title' %}Novo Lead — JuriAI{% endblock %}

{% block 'content' %}

<div class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between sticky top-0 z-10">
  <div>
    <div class="flex items-center gap-1.5 text-xs text-slate-400 font-medium mb-1">
      <a href="{% url 'dashboard' %}" class="hover:text-slate-600 transition-colors">Início</a>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
      <a href="{% url 'lista_crm' %}" class="hover:text-slate-600 transition-colors">CRM</a>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
      <span class="text-slate-600">Novo Lead</span>
    </div>
    <h1 class="text-slate-900 text-xl font-semibold tracking-tight">Novo Lead</h1>
  </div>
</div>

<div class="px-8 py-8 max-w-xl">

  {% if messages %}
  {% for message in messages %}
  <div class="rounded-xl p-4 text-sm font-medium mb-4
    {% if 'green' in message.tags %}bg-emerald-50 text-emerald-800 border border-emerald-200
    {% elif 'red' in message.tags %}bg-red-50 text-red-800 border border-red-200
    {% else %}bg-slate-50 text-slate-800 border border-slate-200{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
  {% endif %}

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
    <form method="POST" action="{% url 'criar_lead' %}" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="nome" class="block text-sm font-medium text-slate-700 mb-1">
          Nome <span class="text-red-500">*</span>
        </label>
        <input type="text" name="nome" id="nome" required
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-300 outline-none transition-colors"
          placeholder="Nome completo do lead">
      </div>

      <div>
        <label for="telefone" class="block text-sm font-medium text-slate-700 mb-1">Telefone</label>
        <input type="text" name="telefone" id="telefone"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-300 outline-none transition-colors"
          placeholder="Ex: 5511999999999">
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" name="email" id="email"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-300 outline-none transition-colors"
          placeholder="email@exemplo.com">
      </div>

      <div>
        <label for="origem" class="block text-sm font-medium text-slate-700 mb-1">Origem</label>
        <select name="origem" id="origem"
          class="w-full border border-slate-200 rounded-xl pl-4 pr-10 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-300 outline-none transition-colors">
          {% for value, label in origem_choices %}
          <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="observacoes" class="block text-sm font-medium text-slate-700 mb-1">Observações</label>
        <textarea name="observacoes" id="observacoes" rows="4"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-300 outline-none transition-colors resize-none"
          placeholder="Informações adicionais sobre o lead..."></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <a href="{% url 'lista_crm' %}"
          class="flex-1 text-center border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
          Cancelar
        </a>
        <button type="submit"
          class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-colors">
          Salvar
        </button>
      </div>
    </form>
  </div>

</div>

{% endblock 'content' %}
